<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Pro | Kundan Wadekar</title>
    
    <link rel="icon" type="image/png" href="hsc.png">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); color: white; padding: 40px 20px; text-align: center; }
        .header-logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; border: 3px solid white; object-fit: cover; }

        .container { max-width: 900px; margin: -30px auto 60px; padding: 0 15px; flex: 1; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input { background: #f1f5f9; border: 2px solid transparent; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; background: white; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8fafc; padding: 10px; text-align: left; font-size: 12px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .chart-container { height: 250px; margin: 20px 0; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #64748b; }

        footer { background: #1e293b; color: #cbd5e1; text-align: center; padding: 25px; font-size: 14px; margin-top: auto; }
        footer b { color: white; }

        @media print { 
            .no-print, footer, #adminLogin, #adminSection, #formCard { display: none !important; } 
            .container { margin-top: 20px; }
            .card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<header>
    <img src="hsc.png" alt="HSC Logo" class="header-logo" onerror="this.style.display='none'">
    <h1>HSC Pro : Digital Portal</h1>
    <p>Empowering Students with Smart Results</p>
</header>

<div class="container">
    <div class="card" id="formCard">
        <h3 style="margin-top:0;">विद्यार्थ्याची माहिती (Student Info)</h3>
        <div class="info-grid">
            <input type="text" id="name" placeholder="पूर्ण नाव (Full Name)">
            <input type="text" id="motherName" placeholder="आईचे नाव (Mother's Name)">
            <input type="text" id="seatNo" placeholder="सीट नंबर (Seat Number)">
            <input type="text" id="college" placeholder="कॉलेजचे नाव (College Name)">
        </div>
        
        <h3 style="border-top: 1px solid #eee; padding-top:15px;">विषयांचे गुण (Marks)</h3>
        <div id="subjectInputs"></div>
        <button onclick="calculate()" id="submitBtn" style="width:100%; margin-top:20px; font-size:16px;">Save & View Marksheet</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <div style="text-align:center; border-bottom: 2px solid #f1f5f9; padding-bottom:15px;">
            <img src="hsc.png" alt="HSC Logo" style="width: 60px; height: 60px; margin-bottom: 10px;" onerror="this.style.display='none'">
            <h2 id="outName" style="margin:0; color:var(--primary); text-transform: uppercase;"></h2>
            <p id="outMother" style="font-weight:600; margin:5px 0;"></p>
            <p id="outMeta" style="color:#64748b; margin:5px 0; font-size: 14px;"></p>
        </div>

        <div style="display:flex; justify-content:space-around; margin:20px 0; text-align:center;">
            <div><small>Percentage</small><div id="outPerc" style="font-size:26px; font-weight:800; color:var(--primary);"></div></div>
            <div><small>Status</small><div id="outStat" style="font-size:26px; font-weight:800;"></div></div>
        </div>

        <div class="chart-container no-print"><canvas id="marksChart"></canvas></div>

        <table>
            <thead><tr><th>Subject</th><th>Theory</th><th>Practical</th><th>Total</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="no-print" style="margin-top:30px; display:flex; gap:10px;">
            <button onclick="window.print()" style="background:#1e293b; flex:1;">📥 Download PDF</button>
            <button onclick="location.reload()" style="background:#64748b; flex:1;">Add New Student</button>
        </div>
    </div>

    <div id="adminLogin" class="card" style="max-width:400px; margin: 50px auto; text-align:center;">
        <h3>🔐 Admin Login</h3>
        <input type="password" id="adminPass" placeholder="Password: Pass@123" style="margin-bottom:15px;">
        <button onclick="checkAdmin()" style="width:100%;">Access Database</button>
    </div>

    <div id="adminSection" class="card" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">Cloud Records</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="exportToExcel()" style="background:#15803d; padding:8px 15px;">📊 Excel</button>
                <button onclick="location.reload()" style="background:#64748b; padding:8px 15px;">Logout</button>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table id="adminTable">
                <thead><tr><th>Seat No</th><th>Name</th><th>Result</th><th>View</th><th>Del</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<footer>
    &copy; 2026 | All Rights Reserved | Developed by <b>Kundan Wadekar</b>
</footer>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBsz2VzSRGSRa9yrwzW_wmTgpkpy4nFOs0",
        authDomain: "hsc-marksheet-3bdc5.firebaseapp.com",
        projectId: "hsc-marksheet-3bdc5",
        storageBucket: "hsc-marksheet-3bdc5.firebasestorage.app",
        messagingSenderId: "855977409015",
        appId: "1:855977409015:web:762d80927f92f082e916f2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const ADMIN_PASSWORD = "HSC@2026";

    const subs = [
        {id:'eng', n:'English', mt:80, mp:20},
        {id:'it', n:'IT / Language', mt:80, mp:20},
        {id:'phy', n:'Physics', mt:70, mp:30},
        {id:'che', n:'Chemistry', mt:70, mp:30},
        {id:'mat', n:'Mathematics', mt:80, mp:20},
        {id:'bio', n:'Biology', mt:70, mp:30}
    ];

    const inputArea = document.getElementById('subjectInputs');
    subs.forEach(s => {
        inputArea.innerHTML += `
            <div class="info-grid" style="grid-template-columns: 1.5fr 1fr 1fr; align-items:center; margin-bottom:10px;">
                <span style="font-weight:600; font-size:14px;">${s.n}</span>
                <input type="number" id="t-${s.id}" placeholder="TH (Max ${s.mt})">
                <input type="number" id="p-${s.id}" placeholder="PR (Max ${s.mp})">
            </div>`;
    });

    async function calculate() {
        let total = 0, isFail = false, marksHtml = '', chartData = [], marksMap = {};
        for(let s of subs) {
            let t = parseInt(document.getElementById(`t-${s.id}`).value) || 0;
            let p = parseInt(document.getElementById(`p-${s.id}`).value) || 0;
            let sum = t + p;
            if(t > s.mt || p > s.mp) { alert(`Invalid marks in ${s.n}`); return; }
            if(sum < 35) isFail = true;
            total += sum;
            chartData.push(sum);
            marksMap[s.id] = { name: s.n, theory: t, practical: p, total: sum };
            marksHtml += `<tr><td>${s.n}</td><td>${t}</td><td>${p}</td><td><b>${sum}</b></td></tr>`;
        }
        const perc = (total / 6).toFixed(2);
        const name = document.getElementById('name').value;
        const mName = document.getElementById('motherName').value;
        const seat = document.getElementById('seatNo').value;
        if(!name || !seat) { alert("Please fill Name and Seat Number"); return; }

        document.getElementById('submitBtn').innerText = "Saving...";
        await db.collection("student_results").add({
            name, mother: mName, seatNo: seat, college: document.getElementById('college').value,
            percentage: perc, result: isFail ? "FAIL" : "PASS", marks: marksMap,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('formCard').style.display = 'none';
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('outName').innerText = name;
        document.getElementById('outMother').innerText = "Mother's Name: " + mName;
        document.getElementById('outMeta').innerText = `Seat No: ${seat} | College: ${document.getElementById('college').value}`;
        document.getElementById('outPerc').innerText = perc + "%";
        document.getElementById('outStat').innerText = isFail ? "FAIL" : "PASS";
        document.getElementById('outStat').style.color = isFail ? "var(--danger)" : "var(--success)";
        document.getElementById('tableBody').innerHTML = marksHtml;
        renderChart(chartData);
    }

    function renderChart(data) {
        new Chart(document.getElementById('marksChart'), {
            type: 'bar',
            data: { labels: ['Eng', 'IT', 'Phy', 'Che', 'Mat', 'Bio'], datasets: [{ label: 'Marks', data: data, backgroundColor: '#4f46e5' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function checkAdmin() {
        if(document.getElementById('adminPass').value === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            loadAdminData();
        } else { alert("Wrong Password!"); }
    }

    function loadAdminData() {
        db.collection("student_results").orderBy("timestamp", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr><td>${d.seatNo}</td><td>${d.name}</td><td>${d.percentage}%</td>
                    <td><button onclick='showDetails(${JSON.stringify(d)})' style="background:var(--success); padding:5px 10px;">View</button></td>
                    <td><button onclick="deleteRec('${doc.id}')" style="background:var(--danger); padding:5px 10px;">Del</button></td></tr>`;
            });
            document.getElementById('adminTableBody').innerHTML = html;
        });
    }

    function showDetails(d) {
        let mHtml = '<table><tr><th>Subject</th><th>Total</th></tr>';
        for(let key in d.marks) { mHtml += `<tr><td>${d.marks[key].name}</td><td><b>${d.marks[key].total}</b></td></tr>`; }
        mHtml += '</table>';
        document.getElementById('modalData').innerHTML = `<h3>${d.name}</h3><p>Seat: ${d.seatNo}</p>${mHtml}`;
        document.getElementById('detailsModal').style.display = "block";
    }

    function closeModal() { document.getElementById('detailsModal').style.display = "none"; }

    async function exportToExcel() {
        const snap = await db.collection("student_results").get();
        const rows = snap.docs.map(doc => {
            const d = doc.data();
            return { "Seat No": d.seatNo, "Name": d.name, "Mother": d.mother, "College": d.college, "Percentage": d.percentage + "%", "Result": d.result };
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Results");
        XLSX.writeFile(wb, "HSC_Student_Records.xlsx");
    }

    async function deleteRec(id) { if(confirm("Delete this record?")) await db.collection("student_results").doc(id).delete(); }
</script>
</body>
</html>
